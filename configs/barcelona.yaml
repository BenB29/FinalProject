# Circuit de Barcelona-Catalunya — loaded from data/tracks/Barcelona.geojson
#
# Barcelona is ~4.7 km, mix of high-speed sweepers and tight chicanes.
# Strong lateral g demands, good test of smooth driving.
# Half-width ~7 m.

experiment_name: "barcelona"
obs_mode: "C"
seed: 42
device: "cuda"

track:
  name: "Barcelona"
  half_width: 7.0
  lookahead_distances: [5, 15, 30, 60, 100, 175, 300]

vehicle:
  mass: 780.0
  wheelbase: 3.0
  max_speed: 80.0
  max_steering_angle: 0.40
  max_steering_rate: 0.70
  max_throttle_accel: 15.0
  max_brake_decel: 22.0
  drag_coeff: 0.55
  roll_resist_coeff: 0.012
  mu_grip: 3.8
  gravity: 9.81
  dt: 0.05

obs:
  speed_max: 80.0
  offset_max: 7.0
  curvature_scale: 50.0

env:
  max_steps: 11000
  no_progress_steps: 500

training:
  total_timesteps: 5_000_000
  n_eval_episodes: 3
  eval_freq: 50_000
  learning_rate: 0.0003
  buffer_size: 1_000_000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  ent_coef: "auto"
  learning_starts: 10_000
  gradient_steps: 1
  train_freq: 1
  n_envs: 8
