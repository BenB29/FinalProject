# Full Suzuka training run — mode C with lookahead curvature.
# Designed to run long enough for a genuine racing line to emerge.

experiment_name: "suzuka_full"
obs_mode: "C"
seed: 42
device: "cuda"

track:
  name: "Suzuka"
  half_width: 7.0
  lookahead_distances: [20, 50, 100, 175, 250]

vehicle:
  mass: 780.0
  wheelbase: 3.0
  max_speed: 80.0
  max_steering_angle: 0.30
  max_steering_rate: 0.60
  max_throttle_accel: 15.0
  max_brake_decel: 22.0
  drag_coeff: 0.55
  roll_resist_coeff: 0.012
  mu_grip: 3.8
  gravity: 9.81
  dt: 0.05

obs:
  speed_max: 80.0
  offset_max: 7.0
  curvature_scale: 50.0

env:
  max_steps: 12000
  no_progress_steps: 400

training:
  total_timesteps: 3_000_000
  n_eval_episodes: 3
  eval_freq: 50_000
  learning_rate: 0.0003
  buffer_size: 1_000_000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  ent_coef: "auto"
  learning_starts: 10_000
  gradient_steps: 1
  train_freq: 1
  n_envs: 8
